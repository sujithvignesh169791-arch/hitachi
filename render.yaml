services:
  # Backend Web Service
  - type: web
    name: equipdriver-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false # User needs to enter this in Render dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false # User needs to enter this in Render dashboard
      - key: JWT_SECRET
        generateValue: true

  # Frontend Static Site
  - type: web
    name: equipdriver-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: equipdriver-backend
          envVarKey: RENDER_EXTERNAL_URL
